<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Warm cream background — matches site #f7f5f0 -->
  <rect width="32" height="32" rx="7" fill="#f7f5f0"/>

  <!-- Head — deep aubergine #3a1240 -->
  <rect x="12" y="4" width="8" height="8" fill="#3a1240"/>
  <!-- Eyes — cream cutouts so they read at 16px -->
  <rect x="13" y="7" width="2" height="2" fill="#f7f5f0"/>
  <rect x="17" y="7" width="2" height="2" fill="#f7f5f0"/>
  <!-- Smile — coral #e85c5c -->
  <rect x="14" y="10" width="4" height="1" fill="#e85c5c"/>

  <!-- Body -->
  <rect x="10" y="13" width="12" height="11" fill="#3a1240"/>
  <!-- Collar detail — coral accent -->
  <rect x="14" y="13" width="4" height="2" fill="#e85c5c"/>
</svg>
